<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a New Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="text-gray-800 antialiased flex flex-col min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-gray-900">Ryan's Blog Dashboard</a>
            <a href="/" class="text-gray-500 hover:text-gray-800 font-medium transition">Cancel</a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">Publish New Article</h1>
            
            <form id="new-post-form" class="space-y-6">
                
                <div>
                    <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">Article Title</label>
                    <input type="text" id="title" required placeholder="e.g., Surviving the Swedish Winter" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label for="author" class="block text-sm font-semibold text-gray-700 mb-2">Author</label>
                        <input type="text" id="author" required value="Ryan" 
                               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="tags" class="block text-sm font-semibold text-gray-700 mb-2">Tags (comma separated)</label>
                        <input type="text" id="tags" placeholder="Travel, Tech, AI" 
                               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div>
                    <label for="content" class="block text-sm font-semibold text-gray-700 mb-2">Article Content</label>
                    <textarea id="content" required rows="10" placeholder="Write your amazing post here..." 
                              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div id="error-message" class="hidden text-red-600 text-sm font-semibold"></div>

                <button type="submit" 
                        class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                    Publish Post
                </button>
            </form>
        </div>
    </main>

    <script>
        // 1. Listen for the user clicking the "Publish" button
        document.getElementById('new-post-form').addEventListener('submit', async function(event) {
            
            // 2. Prevent the browser from refreshing the page
            event.preventDefault(); 
            
            const errorBox = document.getElementById('error-message');
            errorBox.classList.add('hidden');

            // 3. Gather the data from the text boxes and format it properly
            const tagsInput = document.getElementById('tags').value;
            // Convert "Travel, Tech" into an array: ["Travel", "Tech"]
            const tagsArray = tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag !== "");

            const postData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                content: document.getElementById('content').value,
                tags: tagsArray
            };

            try {
                // 4. Send the POST request to FastAPI
                const response = await fetch('/items/', {
                    method: 'POST', // We explicitly tell fetch to use POST, not GET
                    headers: {
                        'Content-Type': 'application/json' // Tell FastAPI we are sending JSON text
                    },
                    // Convert our JavaScript Object into a raw JSON text string
                    body: JSON.stringify(postData) 
                });

                if (!response.ok) {
                    throw new Error("Failed to save the article to the database.");
                }

                // 5. Success! Redirect the user back to the home page to see their new post
                window.location.href = "/";

            } catch (error) {
                errorBox.textContent = error.message;
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
